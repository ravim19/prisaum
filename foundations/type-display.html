<!-- @dsCard group="Type" viewport="700x230" name="Display — Plus Jakarta Sans" subtitle="Headings, extrabold, tight tracking" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;background:var(--color-surface);padding:24px;font-family:var(--font-sans);color:var(--text-strong);}
  .stack{display:flex;flex-direction:column;gap:6px;}
  .line{display:flex;align-items:baseline;gap:16px;}
  .meta{font-family:var(--font-mono);font-size:11px;color:var(--text-muted);width:120px;flex:none;}
  .d1{font-size:var(--text-5xl);font-weight:800;letter-spacing:var(--tracking-tight);line-height:1.05;}
  .d2{font-size:var(--text-4xl);font-weight:800;letter-spacing:var(--tracking-tight);}
  .d3{font-size:var(--text-3xl);font-weight:700;letter-spacing:var(--tracking-tight);}
  .d4{font-size:var(--text-2xl);font-weight:700;}
</style></head><body>
<div class="stack">
  <div class="line"><span class="meta">60 / 800</span><span class="d1">Every ability</span></div>
  <div class="line"><span class="meta">48 / 800</span><span class="d2">Finds opportunity</span></div>
  <div class="line"><span class="meta">36 / 700</span><span class="d3">Vocational excellence</span></div>
  <div class="line"><span class="meta">30 / 700</span><span class="d4">Whom we serve</span></div>
</div>
</body></html>
