<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;background:var(--color-surface);padding:22px;font-family:var(--font-sans);}
  .row{display:flex;gap:12px;flex-wrap:wrap;}
  .pill{display:inline-flex;align-items:center;gap:.5em;padding:.5em .9em;border-radius:var(--radius-pill);font-size:13px;font-weight:600;}
  .dot{width:.5em;height:.5em;border-radius:50%;background:currentColor;}
  .succ{background:var(--status-success-bg);color:var(--status-success-fg);}
  .warn{background:var(--status-warning-bg);color:var(--status-warning-fg);}
  .dang{background:var(--status-danger-bg);color:var(--status-danger-fg);}
  .info{background:var(--status-info-bg);color:var(--status-info-fg);}
  .cap{margin:16px 0 0;font-size:12px;color:var(--text-muted);}
</style></head><body>
<div class="row">
  <span class="pill succ"><span class="dot"></span>Admissions Open</span>
  <span class="pill warn"><span class="dot"></span>Waitlist</span>
  <span class="pill dang"><span class="dot"></span>Closed</span>
  <span class="pill info"><span class="dot"></span>Enquiry received</span>
</div>
<p class="cap">Soft fills pair a tinted background with a darker foreground from the same family — calm, never alarming.</p>
</body></html>
