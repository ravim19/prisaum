<!-- @dsCard group="Colors" viewport="700x170" name="Brand greens" subtitle="Leaf → forest, the core brand hue" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;background:var(--color-surface);padding:20px;font-family:var(--font-sans);}
  .scale{display:grid;grid-template-columns:repeat(11,1fr);gap:8px;max-width:660px;}
  .sw{display:flex;flex-direction:column;gap:6px;}
  .chip{height:64px;border-radius:var(--radius-sm);border:1px solid rgba(0,0,0,.06);}
  .n{font-size:11px;font-weight:700;color:var(--text-strong);}
  .h{font-size:10px;font-family:var(--font-mono);color:var(--text-muted);}
  .tagline{margin:14px 0 0;font-size:12px;color:var(--text-muted);}
  b{color:var(--green-700);}
</style></head><body>
<div class="scale" id="s"></div>
<p class="tagline">Sampled from the logomark (<b>leaf 500 #7c9a55</b>) and its background (<b>forest 900 #2d3f2f</b>).</p>
<script>
const steps=[50,100,200,300,400,500,600,700,800,900,950];
document.getElementById('s').innerHTML=steps.map(n=>{
  const v=getComputedStyle(document.documentElement).getPropertyValue('--green-'+n).trim();
  return `<div class="sw"><div class="chip" style="background:${v}"></div><span class="n">${n}</span><span class="h">${v}</span></div>`;
}).join('');
</script>
</body></html>
