<!-- @dsCard group="Spacing" viewport="700x180" name="Shadows" subtitle="Warm forest-tinted elevation" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;background:var(--color-bg);padding:26px;font-family:var(--font-sans);}
  .row{display:flex;gap:26px;flex-wrap:wrap;}
  .sw{display:flex;flex-direction:column;align-items:center;gap:10px;}
  .box{width:96px;height:64px;background:var(--color-surface);border-radius:var(--radius-md);}
  .n{font-size:11px;font-weight:700;color:var(--text-strong);}
  .h{font-size:10px;font-family:var(--font-mono);color:var(--text-muted);}
</style></head><body>
<div class="row">
  <div class="sw"><div class="box" style="box-shadow:var(--shadow-xs)"></div><span class="n">xs</span></div>
  <div class="sw"><div class="box" style="box-shadow:var(--shadow-sm)"></div><span class="n">sm</span></div>
  <div class="sw"><div class="box" style="box-shadow:var(--shadow-card)"></div><span class="n">card</span></div>
  <div class="sw"><div class="box" style="box-shadow:var(--shadow-md)"></div><span class="n">md</span></div>
  <div class="sw"><div class="box" style="box-shadow:var(--shadow-lg)"></div><span class="n">lg</span></div>
  <div class="sw"><div class="box" style="box-shadow:var(--shadow-xl)"></div><span class="n">xl</span></div>
</div>
</body></html>
