<!-- @dsCard group="Type" viewport="700x180" name="Mono & eyebrow" subtitle="IBM Plex Mono for data; uppercase labels" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;background:var(--color-surface);padding:24px;font-family:var(--font-sans);}
  .row{display:flex;gap:48px;flex-wrap:wrap;align-items:flex-start;}
  .col{display:flex;flex-direction:column;gap:10px;}
  .eyebrow{font-size:var(--text-sm);font-weight:700;letter-spacing:var(--tracking-eyebrow);text-transform:uppercase;color:var(--color-primary);}
  .mono{font-family:var(--font-mono);font-feature-settings:"tnum" 1;color:var(--text-strong);}
  .big{font-size:34px;font-weight:600;letter-spacing:-.02em;}
  .meta{font-size:13px;color:var(--text-muted);}
  .lblmeta{font-family:var(--font-mono);font-size:11px;color:var(--text-muted);}
</style></head><body>
<div class="row">
  <div class="col">
    <span class="lblmeta">// eyebrow / label</span>
    <span class="eyebrow">What we offer</span>
    <span class="eyebrow">Get involved</span>
  </div>
  <div class="col">
    <span class="lblmeta">// IBM Plex Mono · stats & numbers</span>
    <span class="mono big">9840404752</span>
    <span class="mono" style="font-size:18px;color:var(--color-primary);font-weight:600">908/2025 · ₹1,200</span>
  </div>
</div>
</body></html>
