# ─────────────────────────────────────────────────────────────────────────────
# Prisaum SEVA — Nginx redirect/rewrite snippet
# Canonical host: https://prisaum.com  (NON-www — matches your existing canonical)
# Drop these blocks into your Nginx config (adjust ssl_* + root paths).
# ─────────────────────────────────────────────────────────────────────────────

# 1) HTTP (any host) → HTTPS non-www
server {
    listen 80;
    server_name prisaum.com www.prisaum.com;
    return 301 https://prisaum.com$request_uri;
}

# 2) HTTPS www → HTTPS non-www
server {
    listen 443 ssl;
    server_name www.prisaum.com;
    # ssl_certificate ...; ssl_certificate_key ...;
    return 301 https://prisaum.com$request_uri;
}

# 3) Canonical site
server {
    listen 443 ssl;
    server_name prisaum.com;
    root /var/www/prisaum;          # ← your deploy directory
    # ssl_certificate ...; ssl_certificate_key ...;

    index index.html;

    # Strip the HubSpot language query (?hsLang=…)
    if ($arg_hsLang) { return 301 $uri; }

    # Clean URLs: /programs/baking-confectionery → baking-confectionery.html,
    # /about-us → about-us.html, /support → support.html
    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    # Retire HubSpot template / system filler pages
    location = /people-detail-page    { return 301 /; }
    location = /en/people-detail-page { return 301 /; }

    # KEEP /, /about-us, /programs, /support as real pages (SEO value).
    # Old /programs#<anchor> deep links are fragments — forwarded by
    # programs/legacy-hash-redirect.js on the /programs hub (the # never reaches Nginx).
}
